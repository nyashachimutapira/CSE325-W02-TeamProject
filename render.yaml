services:
  - type: web
    name: TaskTrackerApp
    runtime: dotnet
    runtimeVersion: 10.0
    buildCommand: cd TaskTrackerApp && dotnet publish -c Release
    startCommand: cd TaskTrackerApp && dotnet bin/Release/net10.0/TaskTrackerApp.dll
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: production
      - key: ASPNETCORE_URLS
        value: http://0.0.0.0:10000
