services:
  - type: web
    name: TaskTrackerApp
    runtime: dotnet
    runtimeVersion: 8.0
    buildCommand: dotnet publish -c Release -o out
    startCommand: dotnet /app/out/TaskTrackerApp.dll
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: production
      - key: ASPNETCORE_URLS
        value: http://0.0.0.0:10000
